# ──────────────────────────────────────────────
# 사이트 기본 정보
# ──────────────────────────────────────────────
title: "Tech Blog"
subtitle: "Azure, Kubernetes, Cloud Infrastructure<br>DevOps, Full stack Engineering"
description: "Azure, Kubernetes, Network, Security 등 클라우드 인프라 기술 블로그"
url: "https://martinmlops.github.io"
baseurl: ""
locale: "ko-KR"

# ──────────────────────────────────────────────
# 테마 설정
# ──────────────────────────────────────────────
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "air"   # 밝고 깔끔한 스킨 [air, aqua, contrast, dark, default, dirt, mint, neon, plum, sunrise]

# ──────────────────────────────────────────────
# 기능 설정
# ──────────────────────────────────────────────
search: true
search_full_content: true

# 수식 (MathJax)
head_scripts:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Mermaid 다이어그램
after_footer_scripts:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - /assets/js/mermaid-init.js
  - /assets/js/sidebar-toggle.js
  - /assets/js/theme-toggle.js
  - /assets/js/permalink-fix.js
  - /assets/js/toc-active-fix.js

# ──────────────────────────────────────────────
# 저자 정보
# ──────────────────────────────────────────────
author:
  name: "Martin"
  avatar: "/assets/images/profile.jpg"
  bio: "Solutions Architect"
  location: "South Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/martinmlops"

# ──────────────────────────────────────────────
# 댓글 시스템 (Giscus)
# ──────────────────────────────────────────────
comments:
  provider: "giscus"
  giscus:
    repo_id: ""              # placeholder
    category_name: "Comments"
    category_id: ""          # placeholder
    discussion_term: "pathname"
    reactions_enabled: "1"
    theme: "light"
    lang: "ko"

# ──────────────────────────────────────────────
# 분석 (Google Analytics 4)
# ──────────────────────────────────────────────
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-XXXXXXXXXX"   # placeholder

# ──────────────────────────────────────────────
# 페이지네이션
# ──────────────────────────────────────────────
paginate: 10
paginate_path: /page:num/

# ──────────────────────────────────────────────
# 플러그인
# ──────────────────────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate
  - jekyll-include-cache

# ──────────────────────────────────────────────
# 기본값 설정
# ──────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      toc: true
      toc_sticky: true
      show_date: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# ──────────────────────────────────────────────
# 카테고리/태그 아카이브
# ──────────────────────────────────────────────
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# ──────────────────────────────────────────────
# Markdown / 코드 강조
# ──────────────────────────────────────────────
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# ──────────────────────────────────────────────
# 빌드 설정
# ──────────────────────────────────────────────
include:
  - _pages

exclude:
  - "*.gem"
  - "*.gemspec"
  - node_modules
  - __tests__
  - package*.json
  - README.md
  - LICENSE
